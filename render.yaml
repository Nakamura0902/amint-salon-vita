services:
  - type: web
    name: amint-salon-vita
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: amint-salon-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD_HASH
        sync: false  # Set manually in Render dashboard
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false  # Set to your Render domain e.g. https://amint-salon-vita.onrender.com

databases:
  - name: amint-salon-db
    databaseName: amint_salon
    user: amint_user
    plan: free
